<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {

            margin: 0;
            padding: 0;

            overflow: hidden;

            background: black;

            touch-action: none;

            font-family: sans-serif;
        }

        video {

            position: absolute;

            width: 100vw;
            height: 100vh;

            object-fit: cover;

            top: 0;
            left: 0;

            background: black;

            will-change: transform;

            transition:
                transform 0.35s ease,
                filter 0.5s ease,
                opacity 0.5s ease;
        }

        /* ----------------------------- */
        /* DEBUG PANEL */
        /* ----------------------------- */

        #debug {

            position: fixed;

            top: 12px;
            left: 12px;

            z-index: 1000;

            color: white;

            background:
                rgba(0,0,0,0.45);

            padding: 12px 14px;

            border-radius: 12px;

            line-height: 1.7;

            font-size: 14px;

            backdrop-filter: blur(10px);
        }

        .value {

            color: #7dd3fc;

        }

        /* ----------------------------- */
        /* ATMOSPHERE */
        /* ----------------------------- */

        #atmosphere {

            position: fixed;

            inset: 0;

            pointer-events: none;

            z-index: 50;

            transition:
                background 0.6s ease;
        }

        /* ----------------------------- */
        /* PLAY OVERLAY */
        /* ----------------------------- */

        #playOverlay {

            position: fixed;

            inset: 0;

            display: none;

            justify-content: center;
            align-items: center;

            z-index: 500;

            pointer-events: none;
        }

        #playCircle {

            width: 90px;
            height: 90px;

            border-radius: 50%;

            background:
                rgba(0,0,0,0.45);

            display: flex;

            justify-content: center;
            align-items: center;

            backdrop-filter: blur(6px);
        }

        #playTriangle {

            width: 0;
            height: 0;

            border-left: 28px solid white;

            border-top: 18px solid transparent;

            border-bottom: 18px solid transparent;

            margin-left: 6px;
        }

    </style>

</head>

<body>

    <!-- DEBUG -->

    <div id="debug">

        TRACE:
        <span id="traceText"
            class="value">

            walking_01

        </span>

        <br>

        MOVEMENT:
        <span id="movementText"
            class="value">

            0

        </span>

        <br>

        ATTENTION:
        <span id="attentionText"
            class="value">

            OUT

        </span>

        <br>

        IN SCORE:
        <span id="inScoreText"
            class="value">

            0

        </span>

        <br>

        INTERNAL FRICTION:
        <span id="frictionText"
            class="value">

            0

        </span>

    </div>

    <!-- ATMOSPHERE -->

    <div id="atmosphere"></div>

    <!-- PLAY OVERLAY -->

    <div id="playOverlay">

        <div id="playCircle">

            <div id="playTriangle"></div>

        </div>

    </div>

    <!-- VIDEOS -->

    <video id="current"
        muted
        playsinline>
    </video>

    <video id="next"
        muted
        playsinline>
    </video>

    <script>

        // ---------------------------------
        // VIDEO FILES
        // ---------------------------------

        const videos = [

            "videos/vid1.mp4",
            "videos/vid2.mp4",
            "videos/vid3.mp4",
            "videos/vid4.mp4",
            "videos/vid5.mp4"

        ];

        // ---------------------------------
        // TRACE
        // ---------------------------------

        const traceFile =

            "data/walking_01/session_Walking1.json";

        const traceName =
            "walking_01";

        // try:
        // walking_01
        // walking_02
        // still_01
        // still_02

        // ---------------------------------
        // ELEMENTS
        // ---------------------------------

        const current =
            document.getElementById(
                "current"
            );

        const next =
            document.getElementById(
                "next"
            );

        const playOverlay =
            document.getElementById(
                "playOverlay"
            );

        const atmosphere =
            document.getElementById(
                "atmosphere"
            );

        const traceText =
            document.getElementById(
                "traceText"
            );

        const movementText =
            document.getElementById(
                "movementText"
            );

        const attentionText =
            document.getElementById(
                "attentionText"
            );

        const inScoreText =
            document.getElementById(
                "inScoreText"
            );

        const frictionText =
            document.getElementById(
                "frictionText"
            );

        // ---------------------------------
        // VIDEO SETUP
        // ---------------------------------

        current.loop = true;
        next.loop = true;

        current.muted = true;
        next.muted = true;

        current.playsInline = true;
        next.playsInline = true;

        // ---------------------------------
        // TRACE DATA
        // ---------------------------------

        let embodiedTrace = [];

        let traceIndex = 0;

        traceText.innerText =
            traceName;

        fetch(traceFile)

        .then(r => r.json())

        .then(data => {

            embodiedTrace = data;

        });

        // ---------------------------------
        // STATE
        // ---------------------------------

        let currentIndex = 0;

        let dragging = false;

        let startY = 0;

        let currentY = 0;

        // ---------------------------------
        // ATTENTION MODEL
        // ---------------------------------

        let attentionInScore = 0;

        // 0 = OUT
        // 1 = IN

        let internalFriction = 0;

        let swipeThreshold = 120;

        let transitionDelay = 150;

        let autoplayEnabled = true;

        // ---------------------------------
        // START
        // ---------------------------------

        current.src = videos[0];

        current.load();

        current.play();

        preload(1);

        current.style.transform =
            "translateY(0vh)";

        next.style.transform =
            "translateY(100vh)";

        // ---------------------------------
        // PRELOAD
        // ---------------------------------

        function preload(index) {

            const file =

                videos[
                    index % videos.length
                ];

            next.src = file;

            next.load();

        }

        // ---------------------------------
        // MAP RANGE
        // ---------------------------------

        function mapRange(
            value,
            inMin,
            inMax,
            outMin,
            outMax
        ) {

            return (

                (value - inMin)

                *

                (outMax - outMin)

                /

                (inMax - inMin)

                +

                outMin

            );

        }

        // ---------------------------------
        // APPLY TRACE SAMPLE
        // ---------------------------------

        function applyTrace(sample) {

            // -------------------------
            // MOVEMENT VALUE
            // -------------------------

            const movement =

                sample.accel
                +
                sample.gyro;

            movementText.innerText =
                movement.toFixed(1);

            // -------------------------
            // ATTENTION ESTIMATION
            // -------------------------

            // MORE movement
            // = more OUT

            // LESS movement
            // = more IN

            let targetInScore =

                1
                -
                mapRange(

                    movement,

                    8,
                    110,

                    0,
                    1

                );

            // clamp

            targetInScore =

                Math.max(
                    0,

                    Math.min(
                        1,
                        targetInScore
                    )
                );

            // smoothing

            attentionInScore =

                attentionInScore * 0.92
                +
                targetInScore * 0.08;

            // -------------------------
            // INTERNAL FRICTION
            // -------------------------

            internalFriction =

                attentionInScore;

            // -------------------------
            // INTERFACE MODULATION
            // -------------------------

            swipeThreshold =

                mapRange(

                    internalFriction,

                    0,
                    1,

                    80,
                    260

                );

            transitionDelay =

                mapRange(

                    internalFriction,

                    0,
                    1,

                    50,
                    1200

                );

            autoplayEnabled =

                internalFriction < 0.78;

            // -------------------------
            // ATMOSPHERIC MODULATION
            // -------------------------

            const blur =

                mapRange(

                    internalFriction,

                    0,
                    1,

                    0,
                    2.4

                );

            const brightness =

                mapRange(

                    internalFriction,

                    0,
                    1,

                    1,
                    0.82

                );

            current.style.filter =

                `blur(${blur}px)
                 brightness(${brightness})`;

            // vignette

            const vignette =

                mapRange(

                    internalFriction,

                    0,
                    1,

                    0,
                    0.25

                );

            atmosphere.style.background =

                `radial-gradient(
                    circle at center,
                    rgba(0,0,0,0),
                    rgba(0,0,0,${vignette})
                )`;

            // -------------------------
            // DEBUG
            // -------------------------

            inScoreText.innerText =

                attentionInScore
                .toFixed(2);

            frictionText.innerText =

                internalFriction
                .toFixed(2);

            attentionText.innerText =

                attentionInScore > 0.65
                    ? "IN"
                    : "OUT";

        }

        // ---------------------------------
        // TRACE PLAYBACK
        // ---------------------------------

        setInterval(() => {

            if (
                embodiedTrace.length === 0
            ) return;

            const sample =

                embodiedTrace[
                    traceIndex
                ];

            applyTrace(sample);

            traceIndex++;

            if (
                traceIndex
                >= embodiedTrace.length
            ) {

                traceIndex = 0;

            }

        }, 250);

        // ---------------------------------
        // PLAY OVERLAY
        // ---------------------------------

        function showPlayOverlay() {

            playOverlay.style.display =
                "flex";

        }

        function hidePlayOverlay() {

            playOverlay.style.display =
                "none";

        }

        // ---------------------------------
        // TOUCH START
        // ---------------------------------

        document.addEventListener(

            "touchstart",

            e => {

                dragging = true;

                startY =
                    e.touches[0].clientY;

                currentY = startY;

                current.style.transition =
                    "none";

                next.style.transition =
                    "none";

            }

        );

        // ---------------------------------
        // TOUCH MOVE
        // ---------------------------------

        document.addEventListener(

            "touchmove",

            e => {

                if (!dragging)
                    return;

                currentY =
                    e.touches[0].clientY;

                let deltaY =
                    currentY - startY;

                if (deltaY < 0) {

                    current.style.transform =

                        `translateY(${deltaY}px)`;

                    next.style.transform =

                        `translateY(${window.innerHeight + deltaY}px)`;

                }

            }

        );

        // ---------------------------------
        // TOUCH END
        // ---------------------------------

        document.addEventListener(

            "touchend",

            e => {

                dragging = false;

                let dy =

                    e.changedTouches[0].clientY
                    - startY;

                current.style.transition =
                    "transform 0.35s ease, filter 0.5s ease";

                next.style.transition =
                    "transform 0.35s ease";

                // COMPLETE SWIPE

                if (dy < -swipeThreshold) {

                    current.style.transform =
                        "translateY(-100vh)";

                    next.style.transform =
                        "translateY(0vh)";

                    setTimeout(() => {

                        let temp =
                            current;

                        current =
                            next;

                        next =
                            temp;

                        current.style.transition =
                            "none";

                        next.style.transition =
                            "none";

                        current.style.transform =
                            "translateY(0vh)";

                        next.style.transform =
                            "translateY(100vh)";

                        currentIndex =

                            (
                                currentIndex + 1
                            )

                            %

                            videos.length;

                        preload(
                            currentIndex + 1
                        );

                        if (
                            autoplayEnabled
                        ) {

                            hidePlayOverlay();

                            current.currentTime = 0;

                            current.play();

                        }

                        else {

                            current.pause();

                            showPlayOverlay();

                        }

                    },

                    300
                    +
                    transitionDelay

                    );

                }

                // SNAP BACK

                else {

                    current.style.transform =
                        "translateY(0vh)";

                    next.style.transform =
                        "translateY(100vh)";

                }

            }

        );

    </script>

</body>

</html>
