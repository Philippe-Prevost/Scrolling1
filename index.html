<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {

            margin: 0;
            padding: 0;

            overflow: hidden;

            background: black;

            touch-action: none;

            font-family: sans-serif;
        }

        video {

            position: absolute;

            width: 100vw;
            height: 100vh;

            object-fit: cover;

            top: 0;
            left: 0;

            background: black;

            will-change: transform;

            transition:
                transform 0.35s ease;
        }

        /* ----------------------------- */
        /* DEBUG */
        /* ----------------------------- */

        #debug {

            position: fixed;

            top: 12px;
            left: 12px;

            z-index: 1000;

            color: white;

            background:
                rgba(0,0,0,0.45);

            padding: 12px 14px;

            border-radius: 12px;

            line-height: 1.7;

            font-size: 14px;

            backdrop-filter: blur(10px);
        }

        .value {

            color: #7dd3fc;

        }

    </style>

</head>

<body>

    <!-- DEBUG -->

    <div id="debug">

        MODEL:
        <span id="modelText"
            class="value">

            STILL FRICTION

        </span>

        <br>

        MOVEMENT:
        <span id="movementText"
            class="value">

            0

        </span>

        <br>

        WALK DIST:
        <span id="walkingText"
            class="value">

            0

        </span>

        <br>

        STILL DIST:
        <span id="stillText"
            class="value">

            0

        </span>

        <br>

        DETECTED:
        <span id="detectedText"
            class="value">

            ...

        </span>

        <br>

        SWIPE:
        <span id="swipeText"
            class="value">

            0

        </span>

        <br>

        DELAY:
        <span id="delayText"
            class="value">

            0

        </span>

    </div>

    <!-- VIDEOS -->

    <video id="current"
        muted
        playsinline>
    </video>

    <video id="next"
        muted
        playsinline>
    </video>

    <script>

        // ---------------------------------
        // VIDEOS
        // ---------------------------------

        const videos = [

            "videos/vid1.mp4",
            "videos/vid2.mp4",
            "videos/vid3.mp4",
            "videos/vid4.mp4",
            "videos/vid5.mp4"

        ];

        // ---------------------------------
        // MODEL
        // ---------------------------------

        let frictionModel =
            "still";

        // ---------------------------------
        // ELEMENTS
        // ---------------------------------

        let current =
            document.getElementById(
                "current"
            );

        let next =
            document.getElementById(
                "next"
            );

        const modelText =
            document.getElementById(
                "modelText"
            );

        const movementText =
            document.getElementById(
                "movementText"
            );

        const walkingText =
            document.getElementById(
                "walkingText"
            );

        const stillText =
            document.getElementById(
                "stillText"
            );

        const detectedText =
            document.getElementById(
                "detectedText"
            );

        const swipeText =
            document.getElementById(
                "swipeText"
            );

        const delayText =
            document.getElementById(
                "delayText"
            );

        // ---------------------------------
        // VIDEO SETUP
        // ---------------------------------

        current.loop = true;
        next.loop = true;

        current.muted = true;
        next.muted = true;

        current.playsInline = true;
        next.playsInline = true;

        // ---------------------------------
        // START VIDEO
        // ---------------------------------

        current.src = videos[0];

        current.load();

        current.play().catch(err => {

            console.log(err);

        });

        preload(1);

        current.style.transform =
            "translateY(0vh)";

        next.style.transform =
            "translateY(100vh)";

        // ---------------------------------
        // PRELOAD
        // ---------------------------------

        function preload(index) {

            const file =

                videos[
                    index % videos.length
                ];

            next.src = file;

            next.load();

        }

        // ---------------------------------
        // TRAINING DATA
        // ---------------------------------

        let walkingSamples = [];
        let stillSamples = [];

        // ---------------------------------
        // PROFILE VALUES
        // ---------------------------------

        let walkingAverage = 0;
        let stillAverage = 0;

        // ---------------------------------
        // LOAD DATA
        // ---------------------------------

        async function loadTrainingData() {

            // WALKING

            const walking1 = await fetch(

                "data/walking_01/session_Walking1.json"

            ).then(r => r.json());

            const walking2 = await fetch(

                "data/walking_02/session_Walking2.json"

            ).then(r => r.json());

            // STILL

            const still1 = await fetch(

                "data/still_01/sessionStill_1.json"

            ).then(r => r.json());

            const still2 = await fetch(

                "data/still_02/session_Still2.json"

            ).then(r => r.json());

            // MERGE

            walkingSamples = [

                ...walking1,
                ...walking2

            ];

            stillSamples = [

                ...still1,
                ...still2

            ];

            buildProfiles();

        }

        // ---------------------------------
        // AVERAGE MOVEMENT
        // ---------------------------------

        function averageMovement(samples) {

            let total = 0;

            samples.forEach(sample => {

                total +=

                    sample.accel
                    +
                    sample.gyro;

            });

            return total / samples.length;

        }

        // ---------------------------------
        // BUILD PROFILES
        // ---------------------------------

        function buildProfiles() {

            walkingAverage =

                averageMovement(
                    walkingSamples
                );

            stillAverage =

                averageMovement(
                    stillSamples
                );

            console.log(
                "walking avg:",
                walkingAverage
            );

            console.log(
                "still avg:",
                stillAverage
            );

        }

        // ---------------------------------
        // LIVE SENSOR DATA
        // ---------------------------------

        let liveMovement = 0;

        let smoothMovement = 0;

        // ---------------------------------
        // SENSOR LISTENER
        // ---------------------------------

        let lastSensorUpdate = 0;

        window.addEventListener(

            "devicemotion",

            e => {

                const now = Date.now();

                if (
                    now - lastSensorUpdate < 50
                ) return;

                lastSensorUpdate = now;

                // ACCEL

                const acc =
                    e.accelerationIncludingGravity;

                let accel = 0;

                if (acc) {

                    accel = Math.sqrt(

                        (acc.x || 0)
                        *
                        (acc.x || 0)

                        +

                        (acc.y || 0)
                        *
                        (acc.y || 0)

                        +

                        (acc.z || 0)
                        *
                        (acc.z || 0)

                    );

                }

                // GYRO

                const rot =
                    e.rotationRate;

                let gyro = 0;

                if (rot) {

                    gyro = Math.sqrt(

                        (rot.alpha || 0)
                        *
                        (rot.alpha || 0)

                        +

                        (rot.beta || 0)
                        *
                        (rot.beta || 0)

                        +

                        (rot.gamma || 0)
                        *
                        (rot.gamma || 0)

                    );

                }

                // MOVEMENT

                liveMovement =
                    accel + gyro;

                // SMOOTHING

                smoothMovement =

                    smoothMovement * 0.9
                    +
                    liveMovement * 0.1;

            }

        );

        // ---------------------------------
        // FRICTION
        // ---------------------------------

        let swipeThreshold = 90;

        let transitionDelay = 100;

        let autoplayEnabled = true;

        // ---------------------------------
        // CLASSIFICATION LOOP
        // ---------------------------------

        setInterval(() => {

            if (!walkingAverage)
                return;

            // DISTANCES

            const walkingDistance =

                Math.abs(

                    smoothMovement
                    -
                    walkingAverage

                );

            const stillDistance =

                Math.abs(

                    smoothMovement
                    -
                    stillAverage

                );

            // DETECT

            let detectedState =

                walkingDistance
                <
                stillDistance

                ?

                "walking"

                :

                "still";

            // ---------------------------------
            // MODEL A
            // walking = friction
            // ---------------------------------

            let frictionAmount = 0;

            if (
                frictionModel
                === "walking"
            ) {

                frictionAmount =

                    detectedState
                    === "walking"

                    ? 1
                    : 0;

            }

            // ---------------------------------
            // MODEL B
            // still = friction
            // ---------------------------------

            if (
                frictionModel
                === "still"
            ) {

                frictionAmount =

                    detectedState
                    === "still"

                    ? 1
                    : 0;

            }

            // ---------------------------------
            // APPLY FRICTION
            // ---------------------------------

            swipeThreshold =

                frictionAmount

                ?

                260

                :

                90;

            transitionDelay =

                frictionAmount

                ?

                1200

                :

                100;

            autoplayEnabled =

                !frictionAmount;

            // ---------------------------------
            // DEBUG
            // ---------------------------------

            modelText.innerText =

                frictionModel.toUpperCase()
                + " FRICTION";

            movementText.innerText =

                smoothMovement
                .toFixed(1);

            walkingText.innerText =

                walkingDistance
                .toFixed(1);

            stillText.innerText =

                stillDistance
                .toFixed(1);

            detectedText.innerText =
                detectedState;

            swipeText.innerText =
                Math.round(
                    swipeThreshold
                );

            delayText.innerText =
                Math.round(
                    transitionDelay
                );

        }, 250);

        // ---------------------------------
        // DRAGGING
        // ---------------------------------

        let dragging = false;

        let startY = 0;
        let currentY = 0;

        let startX = 0;

        let currentIndex = 0;

        // ---------------------------------
        // TOUCH START
        // ---------------------------------

        document.addEventListener(

            "touchstart",

            e => {

                dragging = true;

                startY =
                    e.touches[0].clientY;

                currentY = startY;

                startX =
                    e.touches[0].clientX;

                current.style.transition =
                    "none";

                next.style.transition =
                    "none";

            }

        );

        // ---------------------------------
        // TOUCH MOVE
        // ---------------------------------

        document.addEventListener(

            "touchmove",

            e => {

                if (!dragging)
                    return;

                currentY =
                    e.touches[0].clientY;

                let deltaY =
                    currentY - startY;

                if (deltaY < 0) {

                    current.style.transform =

                        `translateY(${deltaY}px)`;

                    next.style.transform =

                        `translateY(${window.innerHeight + deltaY}px)`;

                }

            }

        );

        // ---------------------------------
        // TOUCH END
        // ---------------------------------

        document.addEventListener(

            "touchend",

            e => {

                dragging = false;

                let dy =

                    e.changedTouches[0].clientY
                    - startY;

                let dx =

                    e.changedTouches[0].clientX
                    - startX;

                current.style.transition =
                    "transform 0.35s ease";

                next.style.transition =
                    "transform 0.35s ease";

                // ---------------------------------
                // LEFT SWIPE
                // SWITCH MODEL
                // ---------------------------------

                if (Math.abs(dx) > 80) {

                    if (dx < 0) {

                        frictionModel =

                            frictionModel
                            === "walking"

                            ?

                            "still"

                            :

                            "walking";

                    }

                    return;

                }

                // ---------------------------------
                // COMPLETE SWIPE
                // ---------------------------------

                if (dy < -swipeThreshold) {

                    current.style.transform =
                        "translateY(-100vh)";

                    next.style.transform =
                        "translateY(0vh)";

                    setTimeout(() => {

                        let temp =
                            current;

                        current =
                            next;

                        next =
                            temp;

                        current.style.transition =
                            "none";

                        next.style.transition =
                            "none";

                        current.style.transform =
                            "translateY(0vh)";

                        next.style.transform =
                            "translateY(100vh)";

                        currentIndex =

                            (
                                currentIndex + 1
                            )

                            %

                            videos.length;

                        preload(
                            currentIndex + 1
                        );

                        if (
                            autoplayEnabled
                        ) {

                            current.currentTime = 0;

                            current.play().catch(err => {

                                console.log(err);

                            });

                        }

                        else {

                            current.pause();

                        }

                    },

                    300
                    +
                    transitionDelay

                    );

                }

                // ---------------------------------
                // SNAP BACK
                // ---------------------------------

                else {

                    current.style.transform =
                        "translateY(0vh)";

                    next.style.transform =
                        "translateY(100vh)";

                }

            }

        );

        // ---------------------------------
        // LOAD DATA
        // ---------------------------------

        loadTrainingData();

    </script>

</body>

</html>
