<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {

            margin: 0;
            padding: 0;

            overflow: hidden;

            background: black;

            touch-action: none;

            font-family: sans-serif;
        }

        video {

            position: absolute;

            width: 100vw;
            height: 100vh;

            object-fit: cover;

            top: 0;
            left: 0;

            background: black;

            will-change: transform;

            transition:
                transform 0.35s ease,
                filter 0.4s ease;
        }

        /* ----------------------------- */
        /* DEBUG PANEL */
        /* ----------------------------- */

        #debug {

            position: fixed;

            top: 12px;
            left: 12px;

            z-index: 1000;

            color: white;

            background:
                rgba(0,0,0,0.45);

            padding: 12px 14px;

            border-radius: 12px;

            line-height: 1.7;

            font-size: 14px;

            backdrop-filter: blur(10px);
        }

        .value {

            color: #7dd3fc;

        }

    </style>

</head>

<body>

    <!-- DEBUG -->

    <div id="debug">

        MODEL:
        <span id="modelText"
            class="value">

            STILL FRICTION

        </span>

        <br>

        LIVE MOVEMENT:
        <span id="movementText"
            class="value">

            0

        </span>

        <br>

        LIVE INSTABILITY:
        <span id="instabilityText"
            class="value">

            0

        </span>

        <br>

        WALKING SIMILARITY:
        <span id="walkingText"
            class="value">

            0

        </span>

        <br>

        STILL SIMILARITY:
        <span id="stillText"
            class="value">

            0

        </span>

        <br>

        DETECTED:
        <span id="detectedText"
            class="value">

            ...

        </span>

        <br>

        SWIPE:
        <span id="swipeText"
            class="value">

            0

        </span>

        <br>

        DELAY:
        <span id="delayText"
            class="value">

            0

        </span>

    </div>

    <!-- VIDEOS -->

    <video id="current"
        muted
        playsinline>
    </video>

    <video id="next"
        muted
        playsinline>
    </video>

    <script>

        // ---------------------------------
        // VIDEOS
        // ---------------------------------

        const videos = [

            "videos/vid1.mp4",
            "videos/vid2.mp4",
            "videos/vid3.mp4",
            "videos/vid4.mp4"

        ];

        // ---------------------------------
        // CHOOSE MODEL
        // ---------------------------------

        // "walking"
        // "still"

        const frictionModel =
            "still";

        // ---------------------------------
        // ELEMENTS
        // ---------------------------------

        const current =
            document.getElementById(
                "current"
            );

        const next =
            document.getElementById(
                "next"
            );

        const movementText =
            document.getElementById(
                "movementText"
            );

        const instabilityText =
            document.getElementById(
                "instabilityText"
            );

        const walkingText =
            document.getElementById(
                "walkingText"
            );

        const stillText =
            document.getElementById(
                "stillText"
            );

        const detectedText =
            document.getElementById(
                "detectedText"
            );

        const swipeText =
            document.getElementById(
                "swipeText"
            );

        const delayText =
            document.getElementById(
                "delayText"
            );

        const modelText =
            document.getElementById(
                "modelText"
            );

        modelText.innerText =

            frictionModel.toUpperCase()
            + " FRICTION";

        // ---------------------------------
        // VIDEO SETUP
        // ---------------------------------

        current.loop = true;
        next.loop = true;

        current.muted = true;
        next.muted = true;

        current.playsInline = true;
        next.playsInline = true;

        // ---------------------------------
        // VIDEO START
        // ---------------------------------

        current.src = videos[0];

        current.load();

        current.play();

        preload(1);

        current.style.transform =
            "translateY(0vh)";

        next.style.transform =
            "translateY(100vh)";

        // ---------------------------------
        // PRELOAD
        // ---------------------------------

        function preload(index) {

            const file =

                videos[
                    index % videos.length
                ];

            next.src = file;

            next.load();

        }

        // ---------------------------------
        // TRAINING DATA
        // ---------------------------------

        let walkingSamples = [];

        let stillSamples = [];

        // ---------------------------------
        // LOAD DATA
        // ---------------------------------

        async function loadTrainingData() {

            // WALKING

            const walking1 = await fetch(

                "data/walking_01/session_Walking1.json"

            ).then(r => r.json());

            const walking2 = await fetch(

                "data/walking_02/session_Walking2.json"

            ).then(r => r.json());

            // STILL

            const still1 = await fetch(

                "data/still_01/sessionStill_1.json"

            ).then(r => r.json());

            const still2 = await fetch(

                "data/still_02/session_Still2.json"

            ).then(r => r.json());

            // MERGE

            walkingSamples = [

                ...walking1,
                ...walking2

            ];

            stillSamples = [

                ...still1,
                ...still2

            ];

            buildProfiles();

        }

        // ---------------------------------
        // PROFILES
        // ---------------------------------

        let walkingProfile = {

            avgMovement: 0,
            avgInstability: 0

        };

        let stillProfile = {

            avgMovement: 0,
            avgInstability: 0

        };

        // ---------------------------------
        // BUILD PROFILES
        // ---------------------------------

        function buildProfile(samples) {

            let movementSum = 0;

            let instabilitySum = 0;

            let previous = 0;

            samples.forEach(sample => {

                const movement =

                    sample.accel
                    +
                    sample.gyro;

                movementSum += movement;

                const instability =

                    Math.abs(
                        movement - previous
                    );

                instabilitySum += instability;

                previous = movement;

            });

            return {

                avgMovement:

                    movementSum
                    / samples.length,

                avgInstability:

                    instabilitySum
                    / samples.length

            };

        }

        function buildProfiles() {

            walkingProfile =

                buildProfile(
                    walkingSamples
                );

            stillProfile =

                buildProfile(
                    stillSamples
                );

            console.log(
                walkingProfile
            );

            console.log(
                stillProfile
            );

        }

        // ---------------------------------
        // LIVE SENSOR DATA
        // ---------------------------------

        let liveMovement = 0;

        let previousMovement = 0;

        let liveInstability = 0;

        let smoothMovement = 0;

        let smoothInstability = 0;

        // ---------------------------------
        // SENSOR LISTENER
        // ---------------------------------

        let lastSensorUpdate = 0;

        window.addEventListener(

            "devicemotion",

            e => {

                const now = Date.now();

                if (
                    now - lastSensorUpdate < 50
                ) return;

                lastSensorUpdate = now;

                // ACCEL

                const acc =
                    e.accelerationIncludingGravity;

                let accel = 0;

                if (acc) {

                    accel = Math.sqrt(

                        (acc.x || 0)
                        *
                        (acc.x || 0)

                        +

                        (acc.y || 0)
                        *
                        (acc.y || 0)

                        +

                        (acc.z || 0)
                        *
                        (acc.z || 0)

                    );

                }

                // GYRO

                const rot =
                    e.rotationRate;

                let gyro = 0;

                if (rot) {

                    gyro = Math.sqrt(

                        (rot.alpha || 0)
                        *
                        (rot.alpha || 0)

                        +

                        (rot.beta || 0)
                        *
                        (rot.beta || 0)

                        +

                        (rot.gamma || 0)
                        *
                        (rot.gamma || 0)

                    );

                }

                // MOVEMENT

                liveMovement =
                    accel + gyro;

                // INSTABILITY

                liveInstability =

                    Math.abs(

                        liveMovement
                        - previousMovement

                    );

                previousMovement =
                    liveMovement;

                // SMOOTHING

                smoothMovement =

                    smoothMovement * 0.9
                    +
                    liveMovement * 0.1;

                smoothInstability =

                    smoothInstability * 0.9
                    +
                    liveInstability * 0.1;

            }

        );

        // ---------------------------------
        // DISTANCE
        // ---------------------------------

        function computeDistance(
            movement,
            instability,
            profile
        ) {

            return (

                Math.abs(
                    movement
                    -
                    profile.avgMovement
                )

                +

                Math.abs(
                    instability
                    -
                    profile.avgInstability
                )

            );

        }

        // ---------------------------------
        // FRICTION
        // ---------------------------------

        let swipeThreshold = 120;

        let transitionDelay = 150;

        let autoplayEnabled = true;

        // ---------------------------------
        // CLASSIFICATION LOOP
        // ---------------------------------

        setInterval(() => {

            if (
                !walkingProfile.avgMovement
            ) return;

            // DISTANCES

            const walkingDistance =

                computeDistance(

                    smoothMovement,
                    smoothInstability,
                    walkingProfile

                );

            const stillDistance =

                computeDistance(

                    smoothMovement,
                    smoothInstability,
                    stillProfile

                );

            // DETECTION

            let detectedState =

                walkingDistance
                <
                stillDistance

                ?

                "walking"

                :

                "still";

            // ---------------------------------
            // APPLY MODEL
            // ---------------------------------

            let frictionAmount = 0;

            // MODEL A

            if (
                frictionModel
                === "walking"
            ) {

                frictionAmount =

                    detectedState
                    === "walking"

                    ?

                    1

                    :

                    0;

            }

            // MODEL B

            if (
                frictionModel
                === "still"
            ) {

                frictionAmount =

                    detectedState
                    === "still"

                    ?

                    1

                    :

                    0;

            }

            // ---------------------------------
            // APPLY FRICTION
            // ---------------------------------

            swipeThreshold =

                frictionAmount
                === 1

                ?

                260

                :

                90;

            transitionDelay =

                frictionAmount
                === 1

                ?

                1200

                :

                100;

            autoplayEnabled =

                frictionAmount === 0;

            // ---------------------------------
            // DEBUG
            // ---------------------------------

            movementText.innerText =

                smoothMovement
                .toFixed(1);

            instabilityText.innerText =

                smoothInstability
                .toFixed(1);

            walkingText.innerText =

                walkingDistance
                .toFixed(1);

            stillText.innerText =

                stillDistance
                .toFixed(1);

            detectedText.innerText =
                detectedState;

            swipeText.innerText =
                Math.round(
                    swipeThreshold
                );

            delayText.innerText =
                Math.round(
                    transitionDelay
                );

        }, 250);

        // ---------------------------------
        // DRAGGING
        // ---------------------------------

        let dragging = false;

        let startY = 0;

        let currentY = 0;

        let currentIndex = 0;

        // ---------------------------------
        // TOUCH START
        // ---------------------------------

        document.addEventListener(

            "touchstart",

            e => {

                dragging = true;

                startY =
                    e.touches[0].clientY;

                currentY = startY;

                current.style.transition =
                    "none";

                next.style.transition =
                    "none";

            }

        );

        // ---------------------------------
        // TOUCH MOVE
        // ---------------------------------

        document.addEventListener(

            "touchmove",

            e => {

                if (!dragging)
                    return;

                currentY =
                    e.touches[0].clientY;

                let deltaY =
                    currentY - startY;

                if (deltaY < 0) {

                    current.style.transform =

                        `translateY(${deltaY}px)`;

                    next.style.transform =

                        `translateY(${window.innerHeight + deltaY}px)`;

                }

            }

        );

        // ---------------------------------
        // TOUCH END
        // ---------------------------------

        document.addEventListener(

            "touchend",

            e => {

                dragging = false;

                let dy =

                    e.changedTouches[0].clientY
                    - startY;

                current.style.transition =
                    "transform 0.35s ease";

                next.style.transition =
                    "transform 0.35s ease";

                // COMPLETE SWIPE

                if (dy < -swipeThreshold) {

                    current.style.transform =
                        "translateY(-100vh)";

                    next.style.transform =
                        "translateY(0vh)";

                    setTimeout(() => {

                        let temp =
                            current;

                        current =
                            next;

                        next =
                            temp;

                        current.style.transition =
                            "none";

                        next.style.transition =
                            "none";

                        current.style.transform =
                            "translateY(0vh)";

                        next.style.transform =
                            "translateY(100vh)";

                        currentIndex =

                            (
                                currentIndex + 1
                            )

                            %

                            videos.length;

                        preload(
                            currentIndex + 1
                        );

                        if (
                            autoplayEnabled
                        ) {

                            current.currentTime = 0;

                            current.play();

                        }

                        else {

                            current.pause();

                        }

                    },

                    300
                    +
                    transitionDelay

                    );

                }

                // SNAP BACK

                else {

                    current.style.transform =
                        "translateY(0vh)";

                    next.style.transform =
                        "translateY(100vh)";

                }

            }

        );

        // ---------------------------------
        // START LOADING
        // ---------------------------------

        loadTrainingData();

    </script>

</body>

</html>
