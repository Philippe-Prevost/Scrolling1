<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Adaptive Friction Feed</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    #overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;

      background: rgba(0, 0, 0, 0.65);
      padding: 14px;
      border-radius: 14px;

      color: white;
      font-size: 16px;
      line-height: 1.5;

      max-width: 90%;
    }

    #motionState {
      color: #00ff66;
      font-weight: bold;
    }

    #switchButton {
      margin-top: 10px;

      padding: 10px 14px;
      border: none;
      border-radius: 10px;

      background: white;
      color: black;

      font-size: 14px;
      font-weight: bold;

      cursor: pointer;
    }

    #switchButton:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>

  <div id="container">

    <video
      id="video"
      autoplay
      muted
      playsinline
      webkit-playsinline>
    </video>

    <div id="overlay">
      <div id="modelText"></div>
      <div>
        Detected:
        <span id="motionState">STILL</span>
      </div>

      <button id="switchButton">
        Switch Model
      </button>
    </div>

  </div>

  <script>

    console.log("NEW VERSION LOADED");

    // =========================
    // VIDEOS
    // =========================

    const videos = [
      "videos/1.mp4",
      "videos/2.mp4",
      "videos/3.mp4",
      "videos/4.mp4",
      "videos/5.mp4",
      "videos/6.mp4",
      "videos/7.mp4",
      "videos/8.mp4"
    ];

    // =========================
    // MODELS
    // =========================

    const MODELS = {
      A: {
        name: "Model A (more friction still less friction walking)",
        stillFriction: 0.9,
        walkingFriction: 0.2
      },

      B: {
        name: "Model B (more friction walking less friction still)",
        stillFriction: 0.2,
        walkingFriction: 0.9
      }
    };

    let currentModel = MODELS.A;

    // =========================
    // ELEMENTS
    // =========================

    const video = document.getElementById("video");
    const modelText = document.getElementById("modelText");
    const motionStateText = document.getElementById("motionState");
    const switchButton = document.getElementById("switchButton");

    // =========================
    // STATE
    // =========================

    let currentVideoIndex = 0;
    let motionState = "still";

    // =========================
    // UI UPDATE
    // =========================

    function updateUI() {

      modelText.innerHTML =
        `<strong>${currentModel.name}</strong>`;

      motionStateText.textContent =
        motionState.toUpperCase();
    }

    // =========================
    // LOAD VIDEO
    // =========================

    function loadVideo(index) {

      video.pause();

      // unload previous source
      video.removeAttribute("src");
      video.load();

      setTimeout(() => {

        video.src = videos[index];

        video.load();

        const playPromise = video.play();

        if (playPromise !== undefined) {
          playPromise.catch(err => {
            console.log("Playback error:", err);
          });
        }

      }, 100);
    }

    // =========================
    // NEXT VIDEO
    // =========================

    function nextVideo() {

      currentVideoIndex++;

      if (currentVideoIndex >= videos.length) {
        currentVideoIndex = 0;
      }

      loadVideo(currentVideoIndex);
    }

    // =========================
    // VIDEO ENDED
    // =========================

    video.addEventListener("ended", () => {
      nextVideo();
    });

    // =========================
    // SWITCH MODEL
    // =========================

    switchButton.addEventListener("click", () => {

      currentModel =
        currentModel === MODELS.A
          ? MODELS.B
          : MODELS.A;

      updateUI();
    });

    // =========================
    // MOTION DETECTION
    // =========================
    // Replace this with your
    // real accelerometer logic
    // =========================

    setInterval(() => {

      motionState =
        Math.random() > 0.5
          ? "walking"
          : "still";

      updateUI();

    }, 3000);

    // =========================
    // START
    // =========================

    updateUI();

    loadVideo(currentVideoIndex);

  </script>

</body>

</html>
